<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Automation Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background: #1a1d23; color: #c9d1d9; }
        .navbar { background: #161b22 !important; }
        .card { background: #21262d; border-color: #30363d; }
        .table { color: #c9d1d9; }
        .stat-card { border-left: 4px solid; }
        .stat-card.online { border-color: #3fb950; }
        .stat-card.total { border-color: #58a6ff; }
        .stat-card.running { border-color: #d29922; }
        .btn-run { background: #238636; border: none; }
        .btn-run:hover { background: #2ea043; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">
                Task Automation Dashboard
            </a>
            <div class="d-flex gap-3">
                <a href="{% url 'index' %}" class="text-light text-decoration-none">Dashboard</a>
                <a href="{% url 'server_list' %}" class="text-light text-decoration-none">Серверы</a>
                <a href="{% url 'task_list' %}" class="text-light text-decoration-none">Задачи</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
